<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
   <div class="container">
    <div class="form-box">
        <form action="">
            <div class="input-gr">
                <label>Tài khoản</label>
                <input type="account" placeholder="Nhập tài khoản">
            </div>
            <div class="input-gr">
                <label>Mật khẩu</label>
                <input type="password" placeholder="Nhập mật khẩu">
            </div>
            <div class="opt">
                <label>
                    <input type="checkbox"> Ghi nhớ đăng nhập
                </label>
                <a href="#">Quên mật khẩu?</a>
            </div>
            <button type="submit"><a href="./index.html" class="btn">ĐĂNG NHẬP</a></button>
            <p class="switch">
                Chưa có tài khoản?
                <a href="#">Đăng ký</a>
            </p>
        </form>
    </div>
   </div>
</body>
</html>
